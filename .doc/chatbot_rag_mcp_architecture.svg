<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Chatbot with RAG + MCP Architecture</title>
  <desc>Complete chatbot architecture: user chat UI, LLM, MCP server, RAG pipeline, isolated knowledge base</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
      .th       { font-size: 14px; font-weight: 500; }
      .ts       { font-size: 12px; font-weight: 400; }
      .label    { font-size: 11px; font-weight: 400; fill: #888780; }
    </style>
  </defs>

  <!-- ── USER ── -->
  <rect x="240" y="16" width="200" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" fill="#444441" x="340" y="36" text-anchor="middle" dominant-baseline="central">User</text>
  <text class="ts" fill="#5F5E5A" x="340" y="54" text-anchor="middle" dominant-baseline="central">types in chat UI</text>

  <!-- user → LLM -->
  <line x1="340" y1="68" x2="340" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── LLM ── -->
  <rect x="160" y="100" width="360" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" fill="#3C3489" x="340" y="120" text-anchor="middle" dominant-baseline="central">LLM — chatbot brain</text>
  <text class="ts" fill="#534AB7" x="340" y="140" text-anchor="middle" dominant-baseline="central">Llama 3 (local) or Gemini / Claude (API)</text>

  <!-- LLM → MCP -->
  <line x1="340" y1="164" x2="340" y2="196" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="label" x="422" y="184">"I need context"</text>

  <!-- ── MCP SERVER ── -->
  <rect x="160" y="196" width="360" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" fill="#085041" x="340" y="216" text-anchor="middle" dominant-baseline="central">MCP server</text>
  <text class="ts" fill="#0F6E56" x="340" y="236" text-anchor="middle" dominant-baseline="central">search_knowledge(query) — the bridge</text>

  <!-- MCP → RAG -->
  <line x1="340" y1="260" x2="340" y2="292" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── RAG PIPELINE container ── -->
  <rect x="40" y="292" width="600" height="100" rx="10" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="label" x="60" y="312">RAG pipeline</text>

  <!-- Embed query -->
  <rect x="60" y="318" width="140" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" fill="#0C447C" x="130" y="338" text-anchor="middle" dominant-baseline="central">Embed query</text>
  <text class="ts" fill="#185FA5" x="130" y="356" text-anchor="middle" dominant-baseline="central">nomic-embed-text</text>

  <line x1="200" y1="344" x2="234" y2="344" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vector search -->
  <rect x="234" y="318" width="160" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" fill="#0C447C" x="314" y="338" text-anchor="middle" dominant-baseline="central">Vector search</text>
  <text class="ts" fill="#185FA5" x="314" y="356" text-anchor="middle" dominant-baseline="central">top-K chunks</text>

  <line x1="394" y1="344" x2="428" y2="344" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Inject as context -->
  <rect x="428" y="318" width="190" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" fill="#633806" x="523" y="338" text-anchor="middle" dominant-baseline="central">Inject as context</text>
  <text class="ts" fill="#854F0B" x="523" y="356" text-anchor="middle" dominant-baseline="central">chunks → LLM prompt</text>

  <!-- context back to LLM (right side green dashed) -->
  <path d="M523 392 L523 430 L620 430 L620 132 L522 132" fill="none" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-green)"/>
  <text class="label" style="fill:#0F6E56" x="638" y="280">c</text>
  <text class="label" style="fill:#0F6E56" x="638" y="294">o</text>
  <text class="label" style="fill:#0F6E56" x="638" y="308">n</text>
  <text class="label" style="fill:#0F6E56" x="638" y="322">t</text>
  <text class="label" style="fill:#0F6E56" x="638" y="336">e</text>
  <text class="label" style="fill:#0F6E56" x="638" y="350">x</text>
  <text class="label" style="fill:#0F6E56" x="638" y="364">t</text>

  <!-- ── ISOLATED KNOWLEDGE BASE ── -->
  <rect x="40" y="456" width="600" height="88" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1" stroke-dasharray="5 3"/>
  <text class="label" style="fill:#A32D2D" x="60" y="476">isolated knowledge base — ONLY what the chatbot should know</text>

  <rect x="60" y="484" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" fill="#444441" x="135" y="506" text-anchor="middle" dominant-baseline="central">Your docs only</text>

  <rect x="228" y="484" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" fill="#444441" x="303" y="506" text-anchor="middle" dominant-baseline="central">FAQs, policies</text>

  <rect x="396" y="484" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" fill="#444441" x="471" y="506" text-anchor="middle" dominant-baseline="central">Internal APIs</text>

  <!-- KB → RAG (ingestion, left side gray dashed) -->
  <path d="M135 484 L135 420 L130 392" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-gray)"/>
  <text class="label" x="18" y="444">ingested</text>
  <text class="label" x="26" y="458">once</text>

  <!-- answer back to user (left side purple dashed) -->
  <path d="M160 132 L80 132 L80 42 L238 42" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-purple)"/>
  <text class="label" style="fill:#534AB7" x="22" y="80">answer</text>
  <text class="label" style="fill:#534AB7" x="22" y="94">to user</text>

</svg>
