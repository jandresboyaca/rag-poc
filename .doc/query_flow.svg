<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 940" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <style>
      .lbl    { font-size: 13px; fill: #1a1a1a; }
      .lbl-b  { font-size: 13px; fill: #1a1a1a; font-weight: 600; }
      .sub    { font-size: 11px; fill: #555; }
      .step   { font-size: 11px; fill: #fff; font-weight: 700; }
      .legend { font-size: 12px; fill: #1a1a1a; }
      .title  { font-size: 16px; fill: #1a1a1a; font-weight: 700; }
      .arrow  { stroke: #444; stroke-width: 1.6; fill: none; }
    </style>
  </defs>

  <text x="380" y="28" text-anchor="middle" class="title">Query flow — every user question</text>

  <!-- User box -->
  <rect x="280" y="50" width="200" height="50" rx="8" fill="#f4f4f4" stroke="#999"/>
  <text x="380" y="73" text-anchor="middle" class="lbl-b">User question</text>
  <text x="380" y="90" text-anchor="middle" class="sub">terminal CLI</text>

  <line x1="380" y1="100" x2="380" y2="135" class="arrow" marker-end="url(#arrow)"/>

  <!-- LLM #1 — dispatcher -->
  <rect x="200" y="135" width="360" height="78" rx="10" fill="#2563eb" stroke="#1d4ed8"/>
  <text x="220" y="158" class="step">LLM #1</text>
  <text x="220" y="175" fill="#fff" font-size="13" font-weight="600">Conversational / tool dispatcher</text>
  <text x="220" y="194" fill="#dbeafe" font-size="11">qwen2.5:7b-instruct  ·  cli/core/ollama.py</text>
  <text x="220" y="208" fill="#dbeafe" font-size="11">Decides: should I call search_knowledge?</text>

  <line x1="380" y1="213" x2="380" y2="248" class="arrow" marker-end="url(#arrow)"/>
  <text x="395" y="234" class="sub">tool_call via MCP stdio</text>

  <!-- MCP server box wrapping pipeline -->
  <rect x="80" y="248" width="600" height="510" rx="12" fill="#fafafa" stroke="#bbb" stroke-dasharray="4 3"/>
  <text x="100" y="272" class="lbl-b">mcp_rag_server.py → RAGPipeline.answer(query)</text>

  <!-- Step 1: embedding -->
  <rect x="120" y="295" width="520" height="70" rx="10" fill="#16a34a" stroke="#15803d"/>
  <text x="140" y="317" class="step">1. EMBED</text>
  <text x="140" y="335" fill="#fff" font-size="13" font-weight="600">embed_text(query) → vector (4096-dim)</text>
  <text x="140" y="352" fill="#dcfce7" font-size="11">qwen3-embedding:8b  ·  Ollama /api/embed  ·  not an LLM (no text out)</text>

  <line x1="380" y1="365" x2="380" y2="395" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 2: retrieval -->
  <rect x="120" y="395" width="520" height="70" rx="10" fill="#ea580c" stroke="#c2410c"/>
  <text x="140" y="417" class="step">2. RETRIEVE</text>
  <text x="140" y="435" fill="#fff" font-size="13" font-weight="600">ChromaDB.query(vector, n=5) → top-5 chunks</text>
  <text x="140" y="452" fill="#ffedd5" font-size="11">cosine similarity  ·  YOUR DATA  ·  no model</text>

  <line x1="380" y1="465" x2="380" y2="495" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 3: prompt build -->
  <rect x="120" y="495" width="520" height="70" rx="10" fill="#6b7280" stroke="#4b5563"/>
  <text x="140" y="517" class="step">3. PROMPT</text>
  <text x="140" y="535" fill="#fff" font-size="13" font-weight="600">build_rag_prompt(query, chunks)</text>
  <text x="140" y="552" fill="#e5e7eb" font-size="11">fixed template: system + chunks + question  ·  pure function, no model</text>

  <line x1="380" y1="565" x2="380" y2="595" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 4: grounded LLM -->
  <rect x="120" y="595" width="520" height="78" rx="10" fill="#2563eb" stroke="#1d4ed8"/>
  <text x="140" y="617" class="step">4. LLM #2</text>
  <text x="140" y="635" fill="#fff" font-size="13" font-weight="600">Grounded generator</text>
  <text x="140" y="652" fill="#dbeafe" font-size="11">qwen2.5:7b-instruct  ·  Ollama /api/chat  ·  step2_query.call_ollama_chat</text>
  <text x="140" y="666" fill="#dbeafe" font-size="11">Constrained: answer ONLY from chunks above</text>

  <line x1="380" y1="673" x2="380" y2="710" class="arrow" marker-end="url(#arrow)"/>
  <text x="395" y="695" class="sub">grounded answer</text>

  <!-- tool_result -->
  <rect x="200" y="710" width="360" height="38" rx="8" fill="#f4f4f4" stroke="#999"/>
  <text x="380" y="734" text-anchor="middle" class="lbl-b">tool_result returned to LLM #1</text>

  <line x1="380" y1="758" x2="380" y2="790" class="arrow" marker-end="url(#arrow)"/>

  <!-- LLM #1 again -->
  <rect x="200" y="790" width="360" height="60" rx="10" fill="#2563eb" stroke="#1d4ed8"/>
  <text x="220" y="813" class="step">LLM #1 (second turn)</text>
  <text x="220" y="831" fill="#fff" font-size="13" font-weight="600">Formats final answer for user</text>
  <text x="220" y="845" fill="#dbeafe" font-size="11">same model — different role</text>

  <line x1="380" y1="850" x2="380" y2="880" class="arrow" marker-end="url(#arrow)"/>

  <!-- Final answer -->
  <rect x="280" y="880" width="200" height="40" rx="8" fill="#f4f4f4" stroke="#999"/>
  <text x="380" y="905" text-anchor="middle" class="lbl-b">Answer printed in CLI</text>

  <!-- Legend -->
  <g transform="translate(40, 50)">
    <text x="0" y="0" class="lbl-b">Legend</text>
    <rect x="0" y="10"  width="14" height="14" rx="3" fill="#2563eb"/>
    <text x="22" y="22" class="legend">LLM call (chat)</text>
    <rect x="0" y="32"  width="14" height="14" rx="3" fill="#16a34a"/>
    <text x="22" y="44" class="legend">Embedding (vector)</text>
    <rect x="0" y="54"  width="14" height="14" rx="3" fill="#ea580c"/>
    <text x="22" y="66" class="legend">Vector search (data)</text>
    <rect x="0" y="76"  width="14" height="14" rx="3" fill="#6b7280"/>
    <text x="22" y="88" class="legend">Pure function</text>
  </g>
</svg>
