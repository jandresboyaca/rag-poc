<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Local Stack vs Vertex AI</title>
  <desc>Comparison of local Ollama stack vs Vertex AI managed stack for RAG</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .th-blue { font-size: 14px; font-weight: 500; fill: #0C447C; }
      .ts-blue { font-size: 12px; font-weight: 400; fill: #185FA5; }
      .th-gray { font-size: 14px; font-weight: 500; fill: #444441; }
      .ts-gray { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .th-teal { font-size: 14px; font-weight: 500; fill: #085041; }
      .label { font-size: 12px; font-weight: 400; fill: #888780; }
    </style>
  </defs>

  <!-- HEADERS -->
  <rect x="30" y="20" width="290" height="36" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th-gray" x="175" y="43" text-anchor="middle" dominant-baseline="central">Local stack (Ollama)</text>

  <rect x="360" y="20" width="290" height="36" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="505" y="43" text-anchor="middle" dominant-baseline="central">Vertex AI stack</text>

  <!-- ROW 1: Embeddings -->
  <text class="label" x="340" y="90" text-anchor="middle">embeddings</text>
  <rect x="30" y="100" width="290" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th-gray" x="175" y="120" text-anchor="middle" dominant-baseline="central">nomic-embed-text</text>
  <text class="ts-gray" x="175" y="138" text-anchor="middle" dominant-baseline="central">runs on your local CPU/GPU</text>

  <text class="label" x="340" y="127" text-anchor="middle">→</text>

  <rect x="360" y="100" width="290" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="505" y="120" text-anchor="middle" dominant-baseline="central">text-embedding-004</text>
  <text class="ts-blue" x="505" y="138" text-anchor="middle" dominant-baseline="central">managed API by Google</text>

  <!-- ROW 2: Vector DB -->
  <text class="label" x="340" y="178" text-anchor="middle">vector DB</text>
  <rect x="30" y="188" width="290" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th-gray" x="175" y="208" text-anchor="middle" dominant-baseline="central">Chroma (on your disk)</text>
  <text class="ts-gray" x="175" y="226" text-anchor="middle" dominant-baseline="central">you manage backups and scaling</text>

  <text class="label" x="340" y="215" text-anchor="middle">→</text>

  <rect x="360" y="188" width="290" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="505" y="208" text-anchor="middle" dominant-baseline="central">Vertex AI Vector Search</text>
  <text class="ts-blue" x="505" y="226" text-anchor="middle" dominant-baseline="central">auto-scaling, fully managed</text>

  <!-- ROW 3: LLM -->
  <text class="label" x="340" y="266" text-anchor="middle">LLM</text>
  <rect x="30" y="276" width="290" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th-gray" x="175" y="296" text-anchor="middle" dominant-baseline="central">Llama 3 (Ollama)</text>
  <text class="ts-gray" x="175" y="314" text-anchor="middle" dominant-baseline="central">limited by your hardware</text>

  <text class="label" x="340" y="303" text-anchor="middle">→</text>

  <rect x="360" y="276" width="290" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="505" y="296" text-anchor="middle" dominant-baseline="central">Gemini Pro / Flash</text>
  <text class="ts-blue" x="505" y="314" text-anchor="middle" dominant-baseline="central">or your own custom model</text>

  <!-- ROW 4: Infrastructure -->
  <text class="label" x="340" y="354" text-anchor="middle">infrastructure</text>
  <rect x="30" y="364" width="290" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th-gray" x="175" y="384" text-anchor="middle" dominant-baseline="central">Your machine</text>
  <text class="ts-gray" x="175" y="402" text-anchor="middle" dominant-baseline="central">RAM, GPU, disk — all yours</text>

  <text class="label" x="340" y="391" text-anchor="middle">→</text>

  <rect x="360" y="364" width="290" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="505" y="384" text-anchor="middle" dominant-baseline="central">GCP</text>
  <text class="ts-blue" x="505" y="402" text-anchor="middle" dominant-baseline="central">monitoring, logging, IAM included</text>

  <!-- DIVIDER -->
  <line x1="30" y1="438" x2="650" y2="438" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- UNCHANGED row -->
  <text class="label" x="340" y="458" text-anchor="middle">what does NOT change in either stack</text>

  <rect x="80" y="466" width="220" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="190" y="490" text-anchor="middle" dominant-baseline="central">Chunking strategy</text>

  <rect x="390" y="466" width="210" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-teal" x="495" y="490" text-anchor="middle" dominant-baseline="central">Prompt engineering</text>
</svg>
